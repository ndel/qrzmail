name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  root-app:
    name: Root app
    runs-on: ubuntu-latest
    env:
      SESSION_SECRET: ci-session-secret
      REDIS_PASSWORD: ci-redis-password
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  marketing-app:
    name: Marketing app
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: marketing-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: marketing-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

