services:
  qrzmail-marketing:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qrzmail-marketing
    restart: unless-stopped
    environment:
      BASE_URL: "https://qrzmail.com"
      MARKETING_DATA_DIR: "/data"
      MARKETING_POLL_INTERVAL: "10000"
      MARKETING_BATCH_SIZE: "50"
      MARKETING_IMAP_INTERVAL: "60000"
      # Session secret for multi-user auth - MUST be set to a strong random value in production
      # Must match the SESSION_SECRET used by the main QRZMail app if sharing sessions
      SESSION_SECRET: "${MARKETING_SESSION_SECRET:-change-me-to-a-random-secret}"
    volumes:
      - marketing-data:/data
    networks:
      - mailcow-network

volumes:
  marketing-data:

networks:
  mailcow-network:
    external: true
    name: mailcowdockerized_mailcow-network
