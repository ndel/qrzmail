# QRZMail Marketing App - Reverse Proxy Configuration
# This routes /marketing/* to the separate marketing container
# Place this file in the nginx-mailcow container's conf.d directory
# OR add these location blocks inside the existing qrzmail-web.conf server block

# Handle /marketing (without trailing slash) - Next.js with basePath responds here
location = /marketing {
    proxy_pass http://qrzmail-marketing:3000/marketing;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_read_timeout 120;
    proxy_redirect http://qrzmail-marketing:3000/marketing /marketing;
}

# Handle /marketing/* (with trailing slash) - Next.js redirects to /marketing
location ^~ /marketing/ {
    proxy_pass http://qrzmail-marketing:3000/marketing/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_read_timeout 120;
    proxy_redirect http://qrzmail-marketing:3000/marketing/ /marketing/;
}
